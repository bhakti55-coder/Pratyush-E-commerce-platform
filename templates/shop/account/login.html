{% extends "shop/base.html" %}
{% block title %}Log In{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 p-4 rounded-3">
            <h2 class="fw-bold mb-4">Welcome Back</h2>
            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-bold text-secondary">Username</label>
                    <input type="text" name="username" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label fw-bold text-secondary">Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-dark w-100 py-2 fw-bold">Log In</button>
            </form>
            <p class="mt-3 text-center text-muted">New here? <a href="{% url 'shop:register' %}" class="text-decoration-none">Create an account</a></p>
        </div>
    </div>
</div>
{% endblock %}
