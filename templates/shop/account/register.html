{% extends "shop/base.html" %}
{% block title %}Sign Up{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6">
        <div class="card shadow-sm border-0 p-4 rounded-3">
            <h2 class="fw-bold mb-4">Create an Account</h2>
            <form method="POST">
                {% csrf_token %}
                {% for field in user_form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold text-secondary">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}
                    </div>
                {% endfor %}
                <button type="submit" class="btn btn-dark w-100 py-2 fw-bold mt-2">Sign Up</button>
            </form>
            <p class="mt-3 text-center text-muted">Already have an account? <a href="{% url 'shop:login' %}" class="text-decoration-none">Log in</a></p>
        </div>
    </div>
</div>
{% endblock %}
